<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASLAN FİLTRE İŞ MAKİNALARI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8; /* Hafif mavimsi ferah beyaz arka plan */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff; /* Tam beyaz kart arka planı */
            padding: 35px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(12, 66, 110, 0.12); /* Kurumsal mavi tonlu hafif gölge */
            text-align: center;
            max-width: 360px;
            width: 90%;
            margin: 20px auto;
            /* Açılış Animasyonu Tanımı */
            animation: fadeIn 0.8s ease-out;
        }
        /* Animasyon Kodları */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-img {
            width: 190px;
            height: auto;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        h1 {
            color: #0c426e; /* Kurumsal Koyu Mavi */
            font-size: 24px; 
            margin-bottom: 5px;
            font-weight: 800; 
            letter-spacing: 0.5px;
            text-transform: uppercase; 
        }
        .subtitle {
            color: #555;
            font-size: 14px;
            margin-bottom: 25px; 
            font-weight: 600;
            line-height: 1.4;
        }
        .section-title {
            font-size: 12px;
            color: #8fa0af; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 12px;
            text-align: left;
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 5px;
            font-weight: 700;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            padding: 14px;
            margin: 12px 0;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(12, 66, 110, 0.15);
        }
        .btn:active { transform: scale(0.98); }
        
        /* Premium Buton Renkleri */
        .btn-call { background-color: #0c426e; color: #ffffff; border: 2px solid #0c426e; }       
        .btn-whatsapp { background-color: #25D366; color: #ffffff; border: 2px solid #25D366; } 
        .btn-mail { background-color: #4b5563; color: #ffffff; border: 2px solid #4b5563; } 
        .btn-maps { background-color: #ffffff; color: #0c426e; border: 2px solid #0c426e; } 
        
        /* Hover Efektleri */
        .btn-call:hover { background-color: #093254; border-color: #093254; }
        .btn-whatsapp:hover { background-color: #1ebe57; border-color: #1ebe57; }
        .btn-mail:hover { background-color: #374151; border-color: #374151; }
        .btn-maps:hover { background-color: #f8fafc; }
        
        /* Geliştirilmiş Alt Bilgi Alanı */
        .footer-wrapper {
            margin-top: 30px;
            border-top: 1px dashed #e1e8ed;
            padding-top: 15px;
        }
        .footer-text {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 500;
            margin: 2px 0;
        }
        .brand-text {
            font-size: 10px;
            color: #64748b;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="ASLAN FİLTRE LOGO" class="logo-img">
    
    <h1>ASLAN FİLTRE</h1>
    <div class="subtitle">İş Makinaları Filtre ve Yedek Parça<br>San. ve Tic. Ltd. Şti.</div>
    
    <div class="section-title">📍 İletişim & Ulaşım</div>
    
    <a href="tel:+905437458833" class="btn btn-call">📞 Talha ASLAN Ara</a>
    
    <a href="https://wa.me/905437458833?text=Merhaba,%20Aslan%20Filtre%20ile%20iletişime%20geçmek%20istiyorum." target="_blank" class="btn btn-whatsapp">💬 WhatsApp'tan Yaz</a>
    
    <a href="mailto:aslanfiltre@hotmail.com" class="btn btn-mail">✉️ E-posta Gönder</a>
    
    <a href="https://www.google.com/maps/place/Aslan+Filtre/@36.8363885,34.6629683,17z/data=!3m1!4b1!4m6!3m5!1s0x1527f1e570265f9d:0x11097eeca722f213!8m2!3d36.8363885!4d34.6629683!16s%2Fg%2F11s644t_18?hl=tr-TR&entry=ttu&g_ep=EgoyMDI2MDUxMy4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="btn btn-maps">🗺️ Yol Tarifi / Konum</a>
    
    <div class="footer-wrapper">
        <div class="footer-text">© 2026 Aslan Filtre İş Makinaları</div>
        <div class="brand-text">Oluşturucu: CK Plast</div>
    </div>
</div>

</body>
</html>
